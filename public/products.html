<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/logo.png">
  <link rel="apple-touch-icon" href="/images/logo.png">
  <title>Products - MOMOY'S Furniture</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <nav>
    <div class="nav-container">
      <div class="nav-brand">
        <a href="/"><img src="/images/logo.png" alt="Momoy's Furniture Logo" class="nav-logo"></a>
      </div>
      <ul class="nav-links">
        <li><a href="/products.html">Products</a></li>
        <li><a href="#">Offers</a></li>
        <li><a href="#">Services</a></li>
        <li class="auth-required" style="display: none;"><a href="/cart.html">Cart (<span id="cart-count">0</span>)</a></li>
        <li class="auth-required" style="display: none;"><a href="/orders.html">My Orders</a></li>
        <li class="auth-required" style="display: none;"><a href="#" id="logout-btn">Account</a></li>
        <li class="guest-only"><a href="/login.html">Account</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
      <h1>All Products</h1>
      <div>
        <label for="category-filter">Filter by Category: </label>
        <select id="category-filter" style="padding: 0.5rem; border-radius: 5px; border: 1px solid #bdc3c7;">
          <option value="">All Categories</option>
          <option value="Living Room">Living Room</option>
          <option value="Bedroom">Bedroom</option>
          <option value="Dining Room">Dining Room</option>
          <option value="Office">Office</option>
          <option value="Outdoor">Outdoor</option>
        </select>
      </div>
    </div>

    <div id="message" style="display: none;"></div>

    <div id="products-container" class="product-grid">
      <div class="spinner"></div>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/products.js"></script>

  <script>
    // Auto-open product modal if ?id= is in the URL (e.g. coming from featured products)
    async function autoOpenProductFromURL() {
      const params = new URLSearchParams(window.location.search);
      const productId = params.get('id');
      if (!productId) return;

      try {
        const res = await fetch(`${API_BASE_URL}/products/${productId}`);
        if (!res.ok) return;
        const product = await res.json();
        // Wait for products to render first, then open modal
        setTimeout(() => viewProductDetails(product), 600);
      } catch (e) {
        console.error('Auto-open product error:', e);
      }
    }

    // Hide nav on scroll
    (function () {
      const nav = document.querySelector('nav');
      let lastY = window.scrollY;
      let ticking = false;
      window.addEventListener('scroll', () => {
        if (!ticking) {
          window.requestAnimationFrame(() => {
            const currentY = window.scrollY;
            if (currentY > lastY && currentY > 80) {
              nav.classList.add('nav-hidden');
            } else if (currentY < lastY) {
              nav.classList.remove('nav-hidden');
            }
            lastY = currentY;
            ticking = false;
          });
          ticking = true;
        }
      }, { passive: true });
    })();

    // Run after products.js initializes
    window.addEventListener('DOMContentLoaded', () => {
      autoOpenProductFromURL();
    });
  </script>

</body>
</html>
